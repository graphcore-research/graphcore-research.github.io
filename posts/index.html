<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <link rel="canonical" href="/">
    <script>
        (function () {
            const target = "/";
            window.location.replace(new URL(target, window.location.href).href);
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=/">
    </noscript>
</head>
<body>
    <p>Redirecting to <a href="/">/</a>...</p>
</body>
</html>
