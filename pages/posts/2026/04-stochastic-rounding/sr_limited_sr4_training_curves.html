<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="900">
  <title>Limited-Randomness SR4 Training Curves</title>
  <style>
    body { margin: 24px; font-family: system-ui, sans-serif; color: #172033; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    #status { margin: 0 0 16px; color: #4b5563; }
    #preview { max-width: 100%; height: auto; border: 1px solid #ddd; }
    #plot { display: none; width: 100%; height: 980px; min-height: 460px; }
  </style>
</head>
<body>
  <h1>Limited-Randomness SR4 Training Curves</h1>
  <p id="status">Static preview shown. Loading interactive Plotly in the background...</p>
  <img id="preview" src="sr_limited_sr4_training_curves.png" alt="Limited-randomness SR4 static preview">
  <div id="plot"></div>
  <script>
    async function loadInteractivePlot() {
      const script = document.createElement("script");
      script.src = "plotly-3.5.0.min.js";
      script.onload = async function() {
        const response = await fetch("sr_limited_sr4_training_curves.json", { cache: "no-store" });
        const spec = await response.json();
        const plot = document.getElementById("plot");
        const preview = document.getElementById("preview");
        plot.style.display = "block";
        Plotly.newPlot(plot, spec.data, spec.layout, { responsive: true });
        preview.style.display = "none";
        document.getElementById("status").textContent = "Interactive plot loaded. Auto-refreshes every 15 minutes.";
      };
      script.onerror = function() {
        document.getElementById("status").textContent = "Static preview shown; interactive Plotly failed to load.";
      };
      document.head.appendChild(script);
    }
    window.addEventListener("DOMContentLoaded", function() {
      window.setTimeout(loadInteractivePlot, 250);
    });
  </script>
</body>
</html>
